name: Hourly Intraday Snapshot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call snapshot API
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://investment-dashboard-git-main-zqq543-8675s-projects.vercel.app/api/cron/snapshot?mode=intraday")
          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          echo "Status: $HTTP_CODE"
          echo "Body: $HTTP_BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
